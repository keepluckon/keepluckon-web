# ⚠️ 最上面這段 backend 先留著占位，等 DecapBridge 建站後用它給的內容「整段替換」
backend:
  name: git-gateway
  branch: main

# 媒體（上傳的圖片）會存到這個資料夾
media_folder: "assets/uploads"
public_folder: "/keepluckon-web/assets/uploads"

locale: "zh_Hant"

collections:
  # 1. 作品集
  - name: "works"
    label: "作品集"
    folder: "content/works"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "標題", name: "title", widget: "string" }
      - { label: "分類", name: "category", widget: "select", options: ["影音", "設計"] }
      - { label: "縮圖", name: "thumbnail", widget: "image", required: false }
      - { label: "影片或作品連結", name: "url", widget: "string", required: false }
      - { label: "一句話說明", name: "description", widget: "text", required: false }
      - { label: "客戶名稱", name: "client", widget: "string", required: false }
      - { label: "年份", name: "year", widget: "string", required: false }
      - { label: "排序（數字越小越前面）", name: "order", widget: "number", required: false, default: 1 }

  # 2. 常見問答 FAQ
  - name: "faq"
    label: "常見問答"
    folder: "content/faq"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "問題", name: "question", widget: "string" }
      - { label: "答案", name: "answer", widget: "text" }
      - { label: "排序", name: "order", widget: "number", required: false, default: 1 }

  # 3. 合作品牌
  - name: "clients"
    label: "合作品牌"
    folder: "content/clients"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "品牌名稱", name: "name", widget: "string" }
      - { label: "品牌 Logo", name: "logo", widget: "image" }
      - { label: "品牌連結", name: "url", widget: "string", required: false }

  # 4. 客戶好評
  - name: "testimonials"
    label: "客戶好評"
    folder: "content/testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "推薦內容", name: "quote", widget: "text" }
      - { label: "客戶姓名", name: "name", widget: "string" }
      - { label: "職稱／公司", name: "title", widget: "string", required: false }
      - { label: "頭像", name: "avatar", widget: "image", required: false }
